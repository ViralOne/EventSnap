name: Release

# Publish a GitHub Release with installable APKs when a version tag is pushed.
#   git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # required to create the Release and upload assets

jobs:
  release:
    name: Build APKs & publish release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Exposed at job level so the "Decode release keystore" step's `if:` can test its presence.
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Decode the stable release keystore from an encrypted secret into a temp file. The keystore
      # is never committed; if the secret is absent the build falls back to the debug key.
      - name: Decode release keystore
        if: ${{ env.SIGNING_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.jks"
          echo "SIGNING_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      # Release APKs are R8-minified + resource-shrunk (~5–6 MB vs ~72 MB debug) and signed with the
      # stable release key (or the debug key if no secret is set), so they sideload directly.
      - name: Build release APKs (qa + prod)
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: ./gradlew :app-mobile:assembleQaRelease :app-mobile:assembleProdRelease --no-daemon --stacktrace

      - name: Rename APKs with the tag
        env:
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p artifacts
          cp app-mobile/build/outputs/apk/qa/release/app-mobile-qa-release.apk \
            "artifacts/EventSnap-${TAG}-qa-release.apk"
          cp app-mobile/build/outputs/apk/prod/release/app-mobile-prod-release.apk \
            "artifacts/EventSnap-${TAG}-prod-release.apk"
          ls -la artifacts

      - name: Upload APKs as build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: apks
          path: artifacts/*.apk
          retention-days: 30

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.apk
          generate_release_notes: true
          body: |
            EventSnap ${{ github.ref_name }}

            Small, R8-optimized APKs — download one and open it on your Android phone to install
            (you may need to allow "install from unknown sources").

            - **qa-release.apk** — default build, dev tools enabled.
            - **prod-release.apk** — prod flavor (applicationId `.prod`), dev tools off.

            Add your free Groq API key in Settings after installing.
