name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & verify
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Spotless (format check)
        run: ./gradlew spotlessCheck --no-daemon --stacktrace

      - name: Detekt (static analysis)
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Android Lint
        run: ./gradlew lint --no-daemon --stacktrace

      - name: Unit tests
        run: ./gradlew test --no-daemon --stacktrace

      - name: Compile both flavors
        run: ./gradlew :app-mobile:compileQaDebugKotlin :app-mobile:compileProdDebugKotlin --no-daemon --stacktrace

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reports
          path: |
            **/build/reports/lint-results-*.html
            **/build/reports/detekt/*.html
          if-no-files-found: ignore
          retention-days: 7
